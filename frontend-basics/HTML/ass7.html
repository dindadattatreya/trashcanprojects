<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #f0f0f0;">
    <div style="border: 2px solid #000; border-radius: 30px; width: 360px; height: 667px; overflow: hidden; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
        <!-- iPhone-style screen -->
        
        
        <div style="padding: 10px; height: calc(100% - 40px); overflow-y: auto; background: #fff;">
            <div style="background-color: green; text-align: center; padding: 15px 8px; border-radius: 20px;">
                <img src="An Anirudh Musical.png" alt="" style="border-radius: 50%; height: 70px; width: 70px;">
            </div>
            
            <div style="background-color: blue; padding: 15px 10px; text-align: center; margin-top: 10px; border-radius: 20px;">
                <h1 style="color: white; margin: 0; font-size: 1.4em;">John Doe</h1>
                <h3 style="margin: 8px 0 0; font-size: 1em; font-weight: normal;">
                    <span style="color: yellow;">Web Developer</span>
                    <span style="color: white;"> at </span>
                    <span style="color: yellow;">Tech Solutions</span>
                </h3>
            </div>
            
            <div style="background-color: yellow; padding: 15px 10px; margin-top: 10px; border-radius: 20px;">
                <p style="color: black; margin: 0; font-size: 0.9em; line-height: 1.5;">
                    Passionate about creating innovative web solutions that enhance user experience and functionality. Experienced in HTML, CSS, JavaScript, and responsive design.
                </p>
            </div>
            
            <div style="background-color: violet; color: white; padding: 15px 10px; margin-top: 10px; border-radius: 20px;">
                <p style="margin: 6px 0; font-size: 0.9em;">
                    <span style="font-weight: bold;">Email: </span>john.doe@example.com
                </p>
                <p style="margin: 6px 0; font-size: 0.9em;">
                    <span style="font-weight: bold;">Phone: </span>9876543210
                </p>
            </div>
            
            <div style="background-color: red; text-align: center; padding: 15px 10px; margin-top: 10px; border-radius: 20px;">
                <a href="" style="color: yellow; text-decoration: none; font-size: 0.9em; margin: 0 12px; font-weight: 500;">Twitter</a>
                <a href="" style="color: yellow; text-decoration: none; font-size: 0.9em; margin: 0 12px; font-weight: 500;">Linkedin</a>
            </div>
        </div>
        
        <!-- Bottom home bar -->
    </div>
</body>
</html>
