<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellow Home Navbar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .navbar {
            background-color: #000;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            font-family: 'Arial', sans-serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links li a {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            text-transform: uppercase;
            padding: 8px 12px;
            transition: all 0.3s ease;
        }

        .nav-links li a:hover {
            background-color: transparent;
            color: #fff;
        }

        .nav-links li:first-child a {
            background-color: #ff0;
            color: #000;
            border-radius: 4px;
        }

        .nav-links li:first-child a:hover {
            background-color: #ff0;
            color: #000;
        }

        @media (max-width: 768px) {
            .nav-links {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#academics">Academics</a></li>
                <li><a href="#admissions">Admissions</a></li>
                <li><a href="#research">Research</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>
    <br>

    <div style="background-color: lightgreen;"><h1>Welcome to Lovely Professional University</h1></div><br>

    <p style="color: red;">To Explore our program, admissions and research opportunities</p>

</body>
</html>
