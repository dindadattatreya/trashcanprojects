<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid_container{
            display: grid;
            background-color: lightblue;
            padding: 20px;
            /*grid-template-columns: auto auto auto;
            grid-template-rows: 200px;*/
            grid-template: 200px/auto auto auto auto auto;
            grid-auto-rows: 300px;
            /*grid-row-gap: 200px;
            grid-column-gap: 200px;*grid-gap: 200px 300px;*/
            
            
        }
        .items{
            background-color: crimson;
            border: 2px solid pink;
            padding: 20px;
            text-align: center;
            margin: 10px;
        }
        #first1{
            /*grid-row-start: 1;
            grid-row-end: span 3;*/
            grid-row: 1/span 3;
        }
        #first2{
           grid-column-start: 2;
           grid-column-end: span 2;
           
        }
        #first8{
            grid-area: 3/2/span 2/span 2;
        }
       
    </style>
</head>
<body>
    <div class="grid_container">
        <div class="items" id="first1">1</div>
        <div class="items" id="first2">2</div>
        <div class="items">3</div>
        <div class="items">4</div>
        <div class="items">5</div>
        <div class="items">6</div>
        <div class="items">7</div>
        <div class="items" id="first8">8</div>
        <div class="items">9</div>
        <div class="items">10</div>
        <div class="items">11</div>
        <div class="items">12</div>
        <div class="items">13</div>
        <div class="items">14</div>
        <div class="items">15</div>
        <div class="items">16</div>
        <div class="items">17</div>
        <div class="items">18</div>


    </div>
</body>
</html>
