<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input,select,button,textarea{
            padding: 20px;
            width: 100%;
            margin: 0 auto;
            box-sizing: border-box;
        }
        input:hover,select:hover,textarea:hover{
            background-color: red;
        }
        input:focus,select:focus,textarea:focus{
            background-color: green;
        }
    </style>
</head>
<body>
    <form action="Submit.php" method="post">
  <fieldset>
    <legend>Student Details</legend>

    <label for="FirstName">Enter Firstname:</label>
    <input type="text" name="FirstName" placeholder="Enter your name">

    <label for="LastName">Enter LastName:</label>
    <input type="text" name="LastName">

    <label for="username">Create username:</label>
    <input type="text" name="username">

    <label for="password">Create password:</label>
    <input type="password" name="password">

    <label for="email">Enter your email:</label>
    <input type="email" name="email">

    <label for="branch">Select your branch:</label>
    <select id="branch">
      <option>CIVIL</option>
      <option>CSE</option>
      <option>ECE</option>
      <option>EEE</option>
      <option>ME</option>
    </select>

    <label>Choose your hobbies:</label>
    <input type="checkbox" id="h1" name="hobbies" value="Singing"><label for="h1">Singing</label><br>
    <input type="checkbox" id="h2" name="hobbies" value="Dancing"><label for="h2">Dancing</label><br>
    <input type="checkbox" id="h3" name="hobbies" value="Music"><label for="h3">Music</label><br>
    <input type="checkbox" id="h4" name="hobbies" value="Travelling"><label for="h4">Travelling</label><br><br>

    <label>Choose your favorite language:</label>
    <input type="radio" id="C" name="fav_language" value="C"><label for="C">C</label><br>
    <input type="radio" id="java" name="fav_language" value="Java"><label for="java">Java</label><br>
    <input type="radio" id="Python" name="fav_language" value="Python"><label for="Python">Python</label><br><br>

    <textarea name="feedback" rows="4" placeholder="Write your feedback"></textarea>
    <input type="file" name="resume" accept=".pdf">

    <input type="submit" value="Submit">
  </fieldset>
</form>
</body>
</html>
