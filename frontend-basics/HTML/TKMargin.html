<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            border: 2px solid green;
            height: 350px;
        }
        .box1{
            margin: 20px;
            background-color: greenyellow;
            color: red;
        }
        .box2{
            margin-top: 20px;
            margin-right: 25px;
            margin-bottom: 20px;
            margin-left: 30px;
        }
        .box3{
            width: 50%;
            margin: 20px auto;
        }
        .box4{
            width: 300px;
        }
    </style>
</head>
<body>
    <div class="box1">
       this is by using only one margins
    </div>
    <div class="box2">
        this is by using all four values for margin
    </div>
    <div class="box3">
        this is by using two values for margin
    </div>
    <div class="box4">
        this is by using width in px

    </div>
</body>
</html>
