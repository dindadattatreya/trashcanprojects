<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blocks Only</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
    header {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      align-items: flex-start;
    }
    .logo-block {
      width: 150px;
      height: 150px;
      background: #259114;
      border: solid;
      text-align: center;
      padding-top: 55px;
    }
    .menu-bar {
      flex: 1;
      height: 40px;
      background: #259114;
      margin-top: 40px;
      width: 100%;
      border: solid;
    }
    .menu-items {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }
    .menu-item {
      width: 80px;
      height: 35px;
      background: #259114;
      border: solid;
    }

    /* Main area */
    .main {
      display: flex;
      gap: 30px;
      margin-bottom: 50px;
    }
   .sidebar {
  width: 250px;
  height: 300px;
  background: white;
  border: 2px solid #171d10;
  text-align: center;
  padding-top: 140px;
}

.content-area {
  width: 100%;
  height: 400px;
  background: white;
  border: 2px solid black;
  text-align: center;
  padding-top: 180px;
}

footer {
  height: 60px;
  width: 100%;                   
  background: #259114;
  margin-top: 30px;    
  text-align: center;
  padding-top: 20px;
  border: solid;           
}
.colorwhite{
    background-color: white;
}
  </style>
</head>
<body>
  <header>
    <div class="logo-block">LOGO</div>
    <div>
      <div class="menu-bar" style="width: 70%;"></div>
      <div class="menu-bar colorwhite" style="width: 50%;"></div>
      <div class="menu-items">
        <div class="menu-item"></div>
        <div class="menu-item"></div>
        <div class="menu-item"></div>
        <div class="menu-item"></div>
        <div class="menu-item"></div>
        <div class="menu-item"></div>
        <div class="menu-item"></div>
      </div>
    </div>
  </header>
  <div class="main">
    <div class="sidebar">Navigation</div>
    <div class="content-area">Content</div>
  </div>
  <div style="width: 8x0%; margin-left: 250px;"><footer>Footer</footer></div>
  

</body>
</html>
