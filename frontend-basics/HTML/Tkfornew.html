<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        let i=0;
        let model=["Maruti","Volvo","Audi","BMW","Hyundai"]
        let result="";
        for(i=0;i<model.length;i++){
            if(i==2){
                continue;
            }
            result+=model[i]+"<br>"
        }
        document.getElementById("demo").innerHTML=result
    </script>
</body>
</html>
