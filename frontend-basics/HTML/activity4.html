<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        
        .myfont{
            font-family: "Playwrite DE SAS", cursive;
            font-optical-sizing: auto;
            font-weight: weight;
            font-style: normal;
        }
        .Header{
            background-color: black;
            margin-top: 0px;
            padding-bottom: 20px;
        }
        .Heading{
            padding-top: 5px;
            color: white;
            text-align: center;
        }
        .navigation{
            text-align: center;
            word-spacing: 20px;

        }
        .content{
            border: 1px solid black;
            border-radius: 10px;
            margin: 20px 10px;
            background-color: white;
            padding: 10px;
        }
        a{
            text-decoration: none;
            color: white;
        }
        .footer{
            text-align: center;
            padding: 15px;
            border: 1px solid black;
            background-color: black;
            color: white;
        }
        #anchor{
            color: blue;
            text-decoration: underline;
        }
        .box{
            height: 400px;
            background-color: lightgrey;
            margin-top: 0px;
            padding-top: 10px;

        }
    </style>
</head>
<body>
    <div class="Header">
        <div class="Heading">
            <h1 class="myfont">Welcome to My Webpage</h1>
        </div>
        <div class="navigation">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </div>

    
    <div class="box">
        <div class="content">
            <h3>About This page</h3>
            <p>This is a simple webpage to demonstrate styling and linking.</p>
            <a href="#" id="anchor">Visit.example.com</a>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2025 My Webpage</p>
    </div>
</body>
</html>
