<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marks Table</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f8ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .table-container {
      width: 550px;
      background: white;
      border: 6px solid #000;
      border-radius: 35px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 35px;
      color: #000;
      font-size: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border: 4px solid #000;
    }

    /* Default: only horizontal borders */
    th, td {
      border-top: 3px solid #000;
      border-bottom: 3px solid #000;
      border-left: none;
      border-right: none;
      padding: 16px;
      text-align: center;
      font-size: 18px;
    }

    /* Add vertical borders ONLY to subject columns (2nd, 3rd, 4th) */
    th:nth-child(2), th:nth-child(3), th:nth-child(4),
    td:nth-child(2), td:nth-child(3), td:nth-child(4) {
      border-left: 3px solid #000;
    }

    /* Right border on the last column */
    th:last-child, td:last-child {
      border-right: 3px solid #000;
    }

    th {
      background-color: #d0e8ff;
      font-weight: bold;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
  </style>
</head>
<body>

  <div class="table-container">
    <h2>Marks Table</h2>
    
    <table>
      <thead>
        <tr>
          <th>Student Name</th>
          <th>Maths</th>
          <th>Physics</th>
          <th>Computer Science</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Rajesh</td>
          <td>95</td>
          <td>88</td>
          <td>91</td>
        </tr>
        <tr>
          <td>Neha</td>
          <td>87</td>
          <td>92</td>
          <td>89</td>
        </tr>
        <tr>
          <td>Arjun</td>
          <td>78</td>
          <td>85</td>
          <td>93</td>
        </tr>
        <tr>
          <td>Priya</td>
          <td>91</td>
          <td>79</td>
          <td>87</td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
