<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        let i=0;
        let model=["Maruti","Volvo","Audi","BMW","Hyundai"]
        let result="";
        do{
            
            result+=model[i]+"<br>"
            i++
        }while(i<model.length)
        document.getElementById("demo").innerHTML=result
    </script>
</body>
</html>
