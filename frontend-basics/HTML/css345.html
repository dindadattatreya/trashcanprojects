<!DOCTYPE html>
<html>
<head>
<title>Simple HTML Table</title>
<style>
  table, th, td {
    border: 1px solid black;
    border-collapse: collapse;
  }
  th{
    background-color: lightblue;
    color: white;
    font-size: 18px;
  }
  th,td{
    text-align: center;
    padding: 10px;
  }
  /* tr:hover{
    background-color: #d9ead3;
  } */
  tr:nth-child(even){
    background-color: #dc2929;
  }
  tr:nth-child(odd){
    background-color: #75ff2b;
  }
</style>
</head>
<body>

<h2>Example Table</h2>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Age</th>
      <th>City</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Alice</td>
      <td>30</td>
      <td>New York</td>
    </tr>
    <tr>
      <td>Bob</td>
      <td>24</td>
      <td>London</td>
    </tr>
    <tr>
      <td>Charlie</td>
      <td>35</td>
      <td>Paris</td>
    </tr>
  </tbody>
   <tr>
      <td>Alice</td>
      <td>30</td>

    </tr>

    </tr>
    <tr>
      <td>Charlie</td>
      <td>35</td>
      <td>Paris</td>
    </tr>
  <tfoot>
    
  </tfoot>
</table>

</body>
</html>
