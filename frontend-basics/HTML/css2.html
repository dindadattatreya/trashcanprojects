<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 200px;
            height: 100px;
            padding: 20px;
            border: 5px solid red;
            margin: 30px;
            background-color: lightblue;
        }
        .container{
            background-color: lightblue;
            padding: 20px;
            border: 2px solid blue;
        }
        .text{
            color: darkblue;
            font-size: 18px;
        }
        .highlight{
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="box">this a box css example.</div>
    <div class="container">
        <p class="text">Lorem ipsum dolor sit amet.</p>
    </div>
    <p>This is a <span class="highlight">Hello user</span> inside a paragraph</p>
</body>
</html>
