<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="box">Hover over this text</div>
    <h3 id="title">Double Click me</h3>

    <script>
        document.getElementById("box").addEventListener
        ("mouseover",function(){
            this.textContent = "Mouse is over me!!!!";
        });
        document.getElementById("title").addEventListener
        ("dblclick", function(){
            this.style.fontSize="40px";
        });
    </script>
</body>
</html>
